<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> GitHub Issues Tracker </title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>


<body>
<body class="bg-gradient-to-br from-black via-gray-900 to-black min-h-screen flex items-center justify-center font-sans">

<div class="border-white border-2  relative w-[400px] p-[8px] rounded-3xl bg-gradient-to-r from-purple-500 via-pink-500 to-indigo-500 shadow-[0_0_40px_rgba(168,85,247,0.4)]">

  

   <div class="flex justify-center mb-5">
      <div class="p-[2px] rounded-full bg-gradient-to-r from-purple-500 to-pink-500">
        <div class="bg-white rounded-full p-3 shadow-inner">
          <img src="B13-A5-Github-Issue-Tracker/assets/github-logo.png" class="w-10">
        </div>
      </div>
    </div>

<h1 class="text-2xl font-bold mb-1 "> GitHub Issues Tracker </h1>
<p class="text-gray-800 mb-6 "> Sign in to manage your issues </p>

<input id="username" class="w-full border-white p-2 rounded-xl mb-3" placeholder="Enter Username">
<input id="password" type="password" class="w-full border-white p-2 rounded-xl mb-4" placeholder="Enter Password">
<button onclick="login()" class="w-full bg-[#4A00FF] text-white p-2 rounded hover:bg-[#3a00cc]"> Sign In </button>

<div class="flex items-center my-4">

  <hr class="flex-grow border-gray-300">
  <span class="mx-3 text-black"> OR </span>
  <hr class="flex-grow border-gray-300">

</div>

<div class="bg-gradient-to-r from-gray-500 to-gray-900 text-center p-3 rounded-2xl space-y-1">

  <p class="text-white font-semibold"> Demo Access: </p>
  <p class="text-pink-400"><span class="font-bold"> Username: </span> admin </p>
  <p class="text-green-300"><span class="font-bold"> Password: </span> admin123 </p>

</div>

<p id="error" class="text-red-500 mt-2"> </p>

</div>

<script src="script.js"> </script>

</body>
</body>
</html>





</html>
