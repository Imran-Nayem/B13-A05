<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Issues Dashboard</title>
  <link href="./style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- NAVBAR -->
  <nav class="flex justify-between items-center px-6 py-4 bg-white shadow-sm border-b">
    <div class="flex items-center gap-3">
      <div class="bg-white p-2 rounded-full shadow">
        <img src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" class="w-6">
      </div>
      <span class="font-bold text-lg text-gray-800">GitHub Issues Tracker</span>
    </div>

    <div class="flex items-center gap-3">
      <div class="relative">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input id="searchInput" type="text" placeholder="Search issues "
          class="border border-gray-300 pl-10 pr-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
      </div>

      <button onclick="openModal()"
        class="px-4 py-2 rounded-lg bg-indigo-600 text-white font-semibold ">
        + New Issue
      </button>
    </div>
  </nav>

  <!-- TABS -->
  <div class="bg-white mx-6 mt-6 p-3 rounded-xl shadow-sm flex gap-3">
    <button id="AllBtn" class="tab-btn px-4 py-1 rounded-lg bg-pink-600 text-white" onclick="filterIssues('All')">All</button>
    <button id="OpenBtn" class="tab-btn px-4 py-1 rounded-lg bg-gray-100" onclick="filterIssues('Open')">Open</button>
    <button id="ClosedBtn" class="tab-btn px-4 py-1 rounded-lg bg-gray-100" onclick="filterIssues('Closed')">Closed</button>
  </div>

  <!-- HEADER -->
  <div class="bg-white mx-6 mt-4 p-4 rounded-xl shadow-sm flex justify-between items-center">
    <div class="flex items-center gap-4">
      <div class="bg-gray-100 rounded-full p-2">
        <img src="./B13-A5-Github-Issue-Tracker/assets/Aperture.png" class="w-10">
      </div>
      <div>
        <h2 class="text-xl font-bold text-gray-800" id="issueCount">0 Issues</h2>
        <p class="text-gray-500 text-sm">Track and manage your project issues</p>
      </div>
    </div>

    <div class="flex gap-6 text-sm">
      <span class="flex items-center gap-2 text-gray-600">
        <span class="w-4 h-2 rounded-full bg-green-500"></span> Open
      </span>
      <span class="flex items-center gap-2 text-gray-600">
        <span class="w-4 h-2 rounded-full bg-purple-500"></span> Closed
      </span>
    </div>
  </div>

  <!-- ISSUES GRID -->
  <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 mt-6 mx-6"></div>

  <!-- MODAL -->
  <div id="issueModal" class="hidden fixed inset-0 bg-black/60 flex justify-center items-center z-50">
    <div id="modalContent" class="bg-white p-6 rounded-xl shadow-xl  transform transition-transform duration-300 scale-95">
      <h2 class="text-lg font-bold mb-4">Create New Issue</h2>
      <input type="text" placeholder="Issues Title" class="w-full border p-2 rounded mb-3">
      <textarea placeholder="Description:" class="w-full border p-2 rounded mb-3"></textarea>
      <div class="flex justify-end gap-2">
        <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded transition">Cancel</button>
        <button class="px-4 py-2 bg-indigo-600 text-white rounded transition">Create</button>
      </div>
    </div>
  </div>

  <!-- open and close modal -->
  <script>
    function openModal() {
      const modal = document.getElementById('issueModal');
      modal.classList.remove('hidden');
      document.getElementById('modalContent').classList.add('scale-100');
    }

    function closeModal() {
      const modal = document.getElementById('issueModal');
      modal.classList.add('hidden');
      document.getElementById('modalContent').classList.remove('scale-100');
    }
  </script>
  <!-- connection script -->
  <script src="dashboard.js"></script>

</body>
</html>
